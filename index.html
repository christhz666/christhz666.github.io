<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Interactiva: Protección Radiológica</title>
    <!-- Librerías Globales -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #0a1628; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            color: white;
            font-family: 'Roboto', sans-serif;
        }

        #slides-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide-wrapper {
            display: none;
            width: 100%;
            height: 100%;
            overflow: hidden;
            animation: fadeIn 0.5s ease-in-out;
        }

        .slide-wrapper.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Controles discretos para PowerPoint */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 9999;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        
        .controls:hover { opacity: 1; }

        .btn-nav {
            background: rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn-nav:hover {
            background: rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        #slide-counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            z-index: 9999;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: #0a1628;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <p id="loader-text">Cargando Diapositivas...</p>
    </div>

    <div id="slides-container"></div>

    <div id="slide-counter">Preparando presentación...</div>

    <div class="controls">
        <button class="btn-nav" onclick="changeSlide(-1)" title="Anterior"><i class="fas fa-chevron-left"></i></button>
        <button class="btn-nav" onclick="changeSlide(1)" title="Siguiente"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script>
        let currentIdx = 0;
        let totalSlides = 13;
        const container = document.getElementById('slides-container');

        // Limpia el HTML para evitar duplicidad de etiquetas estructurales
        function cleanHTML(rawHtml) {
            let clean = rawHtml.replace(/<!DOCTYPE html>/gi, '');
            clean = clean.replace(/<html[^>]*>|<\/html>/gi, '');
            clean = clean.replace(/<head[^>]*>[\s\S]*?<\/head>/gi, '');
            clean = clean.replace(/<body[^>]*>|<\/body>/gi, '');
            return clean;
        }

        async function loadSlides() {
            const loaderText = document.getElementById('loader-text');
            for (let i = 1; i <= totalSlides; i++) {
                try {
                    loaderText.innerText = `Cargando diapositiva ${i}...`;
                    // Como están en root, la ruta es simplemente i.txt
                    const response = await fetch(`${i}.txt`);
                    if (!response.ok) throw new Error(`No se encontró ${i}.txt`);
                    
                    const text = await response.text();
                    const slideDiv = document.createElement('div');
                    slideDiv.className = `slide-wrapper ${i === 1 ? 'active' : ''}`;
                    slideDiv.id = `slide-${i-1}`;
                    
                    slideDiv.innerHTML = cleanHTML(text);
                    container.appendChild(slideDiv);
                    
                    // Inicializar scripts de la primera slide inmediatamente
                    if (i === 1) executeScripts(slideDiv);
                    
                } catch (err) {
                    console.error("Error crítico:", err);
                    document.getElementById('slide-counter').innerText = "Error cargando archivos";
                }
            }
            document.getElementById('loader').style.display = 'none';
            updateCounter();
        }

        function executeScripts(parent) {
            const scripts = parent.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                parent.appendChild(newScript);
                // Eliminar el script viejo para evitar acumulaciones si se vuelve a entrar
                oldScript.remove();
            });
        }

        function changeSlide(step) {
            const slides = document.querySelectorAll('.slide-wrapper');
            if (slides.length === 0) return;

            slides[currentIdx].classList.remove('active');
            
            currentIdx += step;
            if (currentIdx >= slides.length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = slides.length - 1;

            const nextSlide = slides[currentIdx];
            nextSlide.classList.add('active');
            
            // Re-ejecutar lógica de animaciones y gráficos
            executeScripts(nextSlide);
            updateCounter();
        }

        function updateCounter() {
            document.getElementById('slide-counter').innerText = `Página ${currentIdx + 1} de ${totalSlides}`;
        }

        // Navegación fluida
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
                e.preventDefault();
                changeSlide(1);
            }
            if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                changeSlide(-1);
            }
        });

        window.onload = loadSlides;
    </script>
</body>
</html>
