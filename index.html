<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrección Diapositiva 12 - Líneas Guía</title>
    <style>
        :root {
            --bg-dark: #020617;
            --accent-blue: #3b82f6;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            overflow: hidden;
        }

        .slide-iframe {
            width: 1280px;
            height: 720px;
            background: #000;
            border: 1px solid #334155;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform-origin: center;
        }

        #toolbar {
            height: 60px;
            background: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            z-index: 100;
        }

        .slide-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .badge {
            background: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .controls-hint {
            color: #94a3b8;
            font-size: 13px;
        }

        .save-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="canvas-area">
        <div id="slide-wrapper">
            <!-- El iframe se inyecta aquí -->
        </div>
    </div>

    <div id="toolbar">
        <div class="slide-info">
            <span class="badge" id="slide-label">Diapositiva 12</span>
            <span class="controls-hint">Usa las flechas ← → para navegar. Arrastra las líneas para moverlas.</span>
        </div>
        <div id="save-status" style="color: #10b981; font-weight: 500; font-size: 13px; display: none;">
            Cambios guardados localmente
        </div>
    </div>
</div>

<div id="save-toast" class="save-toast">Posición guardada</div>

<script>
    let currentSlide = 12;
    const totalSlides = 13;
    const wrapper = document.getElementById('slide-wrapper');
    const slideLabel = document.getElementById('slide-label');
    const saveToast = document.getElementById('save-toast');

    // Función para guardar posiciones
    function saveElementPos(slideId, elementId, top, left) {
        const key = `slide_v2_pos_${slideId}`;
        let data = JSON.parse(localStorage.getItem(key) || '{}');
        data[elementId] = { top, left };
        localStorage.setItem(key, JSON.stringify(data));
        
        document.getElementById('save-status').style.display = 'block';
        setTimeout(() => { document.getElementById('save-status').style.display = 'none'; }, 2000);
    }

    // Carga de la diapositiva
    async function loadSlide(num) {
        currentSlide = num;
        slideLabel.innerText = `Diapositiva ${num}`;
        wrapper.innerHTML = '';
        
        const iframe = document.createElement('iframe');
        iframe.className = 'slide-iframe';
        // Intentamos cargar el contenido. Si no existe el archivo físico, usamos un mockup para pruebas
        try {
            const response = await fetch(`${num}.txt`);
            if (response.ok) {
                const content = await response.text();
                iframe.srcdoc = content;
            } else {
                // Mockup específico para la diapositiva 12 si falla la carga
                if (num === 12) {
                    iframe.srcdoc = `
                        <html>
                        <body style="background:#0a0a0a; color:white; overflow:hidden; font-family:sans-serif;">
                            <div style="padding: 50px;">
                                <h1>Análisis de Datos - Diapositiva 12</h1>
                                <p>Mueve las líneas guía que delimitan los cuadrantes.</p>
                                <!-- Estas son las líneas que el usuario no podía mover -->
                                <div id="guia-h" class="linea-guia" style="position:absolute; top:300px; left:0; width:100%; height:2px; background:rgba(59,130,246,0.5); box-shadow: 0 0 10px blue;"></div>
                                <div id="guia-v" class="linea-guia" style="position:absolute; top:0; left:640px; width:2px; height:100%; background:rgba(59,130,246,0.5); box-shadow: 0 0 10px blue;"></div>
                            </div>
                        </body>
                        </html>
                    `;
                }
            }
        } catch (e) { console.error(e); }

        wrapper.appendChild(iframe);
        iframe.onload = () => {
            adjustScale(iframe);
            setupInteractions(iframe, num);
        };
    }

    function adjustScale(iframe) {
        const scale = Math.min((window.innerWidth - 60) / 1280, (window.innerHeight - 100) / 720);
        iframe.style.transform = `scale(${scale})`;
    }

    function setupInteractions(iframe, slideId) {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        
        // Inyectar CSS de corrección para líneas
        const style = doc.createElement('style');
        style.innerHTML = `
            * { pointer-events: auto !important; }
            .linea-guia, hr, [style*="height: 1px"], [style*="height: 2px"], [style*="width: 1px"], [style*="width: 2px"] {
                cursor: ns-resize !important;
                min-height: 10px !important; /* Aumentar área de agarre */
                z-index: 9999 !important;
            }
            [style*="width: 1px"], [style*="width: 2px"] {
                cursor: ew-resize !important;
                min-width: 10px !important;
            }
        `;
        doc.head.appendChild(style);

        const elements = doc.querySelectorAll('body *');
        const savedData = JSON.parse(localStorage.getItem(`slide_v2_pos_${slideId}`) || '{}');

        elements.forEach((el, i) => {
            if (el.tagName === 'SCRIPT' || el.tagName === 'STYLE') return;
            
            const elId = el.id || `el-${slideId}-${i}`;
            el.setAttribute('data-drag-id', elId);

            // Aplicar posiciones guardadas
            if (savedData[elId]) {
                el.style.position = 'absolute';
                el.style.top = savedData[elId].top;
                el.style.left = savedData[elId].left;
                el.style.margin = '0';
            }

            // Lógica de arrastre
            el.onmousedown = (e) => {
                if (e.button !== 0) return;
                e.preventDefault();
                e.stopPropagation();

                const startY = e.clientY;
                const startX = e.clientX;
                const startTop = el.offsetTop;
                const startLeft = el.offsetLeft;

                // Forzar posición absoluta para poder mover
                el.style.position = 'absolute';
                el.style.margin = '0';

                const onMouseMove = (me) => {
                    const dy = me.clientY - startY;
                    const dx = me.clientX - startX;
                    el.style.top = (startTop + dy) + 'px';
                    el.style.left = (startLeft + dx) + 'px';
                };

                const onMouseUp = () => {
                    saveElementPos(slideId, elId, el.style.top, el.style.left);
                    doc.removeEventListener('mousemove', onMouseMove);
                    doc.removeEventListener('mouseup', onMouseUp);
                };

                doc.addEventListener('mousemove', onMouseMove);
                doc.addEventListener('mouseup', onMouseUp);
            };
        });
    }

    // Navegación
    window.onkeydown = (e) => {
        if (e.key === 'ArrowRight' && currentSlide < totalSlides) loadSlide(currentSlide + 1);
        if (e.key === 'ArrowLeft' && currentSlide > 1) loadSlide(currentSlide - 1);
    };

    window.onresize = () => adjustScale(document.querySelector('.slide-iframe'));

    // Iniciar en la 12
    loadSlide(12);

</script>
</body>
</html>
