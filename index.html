<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurador de Diapositiva 12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; overflow: hidden; }
        
        /* Contenedor principal que permite scroll pero oculta barras */
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            cursor: grab;
            scroll-behavior: smooth;
        }
        #viewport:active { cursor: grabbing; }
        #viewport::-webkit-scrollbar { display: none; }

        /* Espacio de trabajo infinito */
        #workspace {
            width: 2000px;
            height: 2000px;
            position: relative;
            background: 
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .card {
            position: absolute;
            cursor: move;
            transition: box-shadow 0.2s;
            user-select: none;
        }
        .card:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }

        .line {
            position: absolute;
            background-color: #1e293b;
            pointer-events: none; /* No interfieren con el click */
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="workspace">
        <!-- Título -->
        <h1 id="main-title" class="absolute text-4xl font-bold text-blue-500" style="top: 100px; left: 100px;">
            Análisis de Resultados de Usuario
        </h1>

        <!-- Líneas de fondo (ahora fijas al fondo pero se mueven con el scroll) -->
        <div class="line" style="top: 250px; left: 0; width: 100%; height: 2px;"></div>
        <div class="line" style="top: 0; left: 500px; width: 2px; height: 100%;"></div>

        <!-- Tarjetas Restauradas -->
        <div id="card-1" class="card bg-slate-800 border-l-4 border-blue-500 p-6 rounded-lg w-72" style="top: 300px; left: 150px;">
            <h3 class="text-gray-400 text-sm font-semibold uppercase">Métrica A</h3>
            <p class="text-3xl font-bold text-white mt-1">84.2%</p>
            <p class="text-green-400 text-xs mt-2">↑ 5% incremento</p>
        </div>

        <div id="card-2" class="card bg-slate-800 border-l-4 border-blue-500 p-6 rounded-lg w-72" style="top: 300px; left: 550px;">
            <h3 class="text-gray-400 text-sm font-semibold uppercase">Métrica B</h3>
            <p class="text-3xl font-bold text-white mt-1">12,400</p>
            <p class="text-blue-400 text-xs mt-2">Usuarios registrados</p>
        </div>

        <div id="card-3" class="card bg-slate-800 border-l-4 border-blue-500 p-6 rounded-lg w-72" style="top: 550px; left: 350px;">
            <h3 class="text-gray-400 text-sm font-semibold uppercase">Estado del Sistema</h3>
            <p class="text-3xl font-bold text-white mt-1">Óptimo</p>
            <div class="w-full bg-gray-700 h-2 mt-3 rounded-full overflow-hidden">
                <div class="bg-blue-500 h-full w-[90%]"></div>
            </div>
        </div>
    </div>
</div>

<!-- Controles flotantes -->
<div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 border border-slate-700 px-6 py-3 rounded-full flex gap-6 items-center shadow-2xl z-50">
    <div class="text-xs text-slate-400">
        <span class="font-bold text-blue-500">CLICK IZQUIERDO:</span> Mover Tarjetas
    </div>
    <div class="text-xs text-slate-400">
        <span class="font-bold text-blue-500">CLICK DERECHO/ARRASTRAR FONDO:</span> Mover Vista (Scroll)
    </div>
    <button onclick="resetView()" class="text-xs bg-slate-800 hover:bg-slate-700 text-white px-3 py-1 rounded border border-slate-600 transition">Resetear Vista</button>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const workspace = document.getElementById('workspace');
    let isDraggingView = false;
    let startX, startY, scrollLeft, scrollTop;

    // --- LÓGICA PARA MOVER LA VISTA (EL FONDO) ---
    viewport.addEventListener('mousedown', (e) => {
        if (e.target === workspace || e.target.classList.contains('line')) {
            isDraggingView = true;
            startX = e.pageX - viewport.offsetLeft;
            startY = e.pageY - viewport.offsetTop;
            scrollLeft = viewport.scrollLeft;
            scrollTop = viewport.scrollTop;
        }
    });

    viewport.addEventListener('mouseleave', () => isDraggingView = false);
    viewport.addEventListener('mouseup', () => isDraggingView = false);

    viewport.addEventListener('mousemove', (e) => {
        if (!isDraggingView) return;
        e.preventDefault();
        const x = e.pageX - viewport.offsetLeft;
        const y = e.pageY - viewport.offsetTop;
        const walkX = (x - startX);
        const walkY = (y - startY);
        viewport.scrollLeft = scrollLeft - walkX;
        viewport.scrollTop = scrollTop - walkY;
    });

    // --- LÓGICA PARA MOVER LAS TARJETAS ---
    const cards = document.querySelectorAll('.card, #main-title');
    cards.forEach(card => {
        let isMovingCard = false;
        let cardX, cardY;

        card.addEventListener('mousedown', (e) => {
            isMovingCard = true;
            cardX = e.clientX - card.offsetLeft;
            cardY = e.clientY - card.offsetTop;
            card.style.zIndex = 100;
            e.stopPropagation(); // Evita que se mueva el fondo
        });

        document.addEventListener('mousemove', (e) => {
            if (!isMovingCard) return;
            card.style.left = (e.clientX - cardX) + 'px';
            card.style.top = (e.clientY - cardY) + 'px';
        });

        document.addEventListener('mouseup', () => {
            if(isMovingCard) {
                isMovingCard = false;
                card.style.zIndex = 10;
            }
        });
    });

    function resetView() {
        viewport.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
