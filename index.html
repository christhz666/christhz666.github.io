<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Interactiva: Protección Radiológica</title>
    <!-- Librerías Globales -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #0a1628; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #slides-container {
            width: 1280px;  /* Ancho original de tus archivos .txt */
            height: 720px;  /* Alto original de tus archivos .txt */
            position: relative;
            transform-origin: center center;
        }

        .slide-wrapper {
            display: none;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            animation: fadeIn 0.5s ease-in-out;
        }

        .slide-wrapper.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Controles */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 9999;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        
        .controls:hover { opacity: 1; }

        .btn-nav {
            background: rgba(59, 130, 246, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-nav:hover {
            background: rgba(59, 130, 246, 0.8);
            transform: scale(1.1);
        }

        #slide-counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            z-index: 9999;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0a1628;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <p id="loader-text">Ajustando resolución...</p>
    </div>

    <div id="slides-container"></div>

    <div id="slide-counter">Cargando...</div>

    <div class="controls">
        <button class="btn-nav" onclick="changeSlide(-1)"><i class="fas fa-arrow-left"></i></button>
        <button class="btn-nav" onclick="changeSlide(1)"><i class="fas fa-arrow-right"></i></button>
    </div>

    <script>
        let currentIdx = 0;
        let totalSlides = 13;
        const container = document.getElementById('slides-container');

        // Función de escalado automático para que quepa en cualquier pantalla
        function fitSlides() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const scale = Math.min(vw / 1280, vh / 720);
            container.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', fitSlides);

        function cleanHTML(rawHtml) {
            let clean = rawHtml.replace(/<!DOCTYPE html>/gi, '');
            clean = clean.replace(/<html[^>]*>|<\/html>/gi, '');
            clean = clean.replace(/<head[^>]*>[\s\S]*?<\/head>/gi, '');
            clean = clean.replace(/<body[^>]*>|<\/body>/gi, '');
            return clean;
        }

        async function loadSlides() {
            fitSlides();
            for (let i = 1; i <= totalSlides; i++) {
                try {
                    const response = await fetch(`${i}.txt`);
                    if (!response.ok) throw new Error();
                    const text = await response.text();
                    
                    const slideDiv = document.createElement('div');
                    slideDiv.className = `slide-wrapper ${i === 1 ? 'active' : ''}`;
                    slideDiv.innerHTML = cleanHTML(text);
                    container.appendChild(slideDiv);
                    
                    if (i === 1) executeScripts(slideDiv);
                } catch (err) {
                    console.warn(`Error en slide ${i}`);
                }
            }
            document.getElementById('loader').style.display = 'none';
            updateCounter();
        }

        function executeScripts(parent) {
            const scripts = parent.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.textContent = oldScript.textContent;
                parent.appendChild(newScript);
                oldScript.remove();
            });
        }

        function changeSlide(step) {
            const slides = document.querySelectorAll('.slide-wrapper');
            if (slides.length === 0) return;
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + step + slides.length) % slides.length;
            slides[currentIdx].classList.add('active');
            executeScripts(slides[currentIdx]);
            updateCounter();
        }

        function updateCounter() {
            document.getElementById('slide-counter').innerText = `Presentación: ${currentIdx + 1} / ${totalSlides}`;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        window.onload = loadSlides;
    </script>
</body>
</html>
