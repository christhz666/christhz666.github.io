<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Interactiva: Protección Radiológica</title>
    <!-- Recursos Globales -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet"/>
    <!-- Cargamos Chart.js globalmente para que esté disponible en todas las diapositivas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            background: #020617; 
            height: 100vh; width: 100vw; 
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        #presentation-viewport {
            width: 1280px; height: 720px;
            position: relative;
            transform-origin: center center;
            background: #0a1628;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .slide-frame {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide-frame.active {
            display: block;
        }

        /* Controles UI */
        .ui-overlay {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            z-index: 9999;
            opacity: 0.4;
            transition: opacity 0.3s, transform 0.2s;
        }
        .ui-overlay:hover { opacity: 1; transform: translateY(-2px); }

        .nav-btn {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 50px; height: 50px;
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .nav-btn:hover { background: #3b82f6; border-color: #60a5fa; }

        #counter {
            position: fixed;
            bottom: 35px;
            left: 35px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="color: #60a5fa; margin-top: 25px; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; font-weight: 700;">Optimizando visualización...</p>
    </div>

    <div id="presentation-viewport"></div>

    <div id="counter">CARGANDO...</div>

    <div class="ui-overlay">
        <button class="nav-btn" title="Anterior (Flecha Izquierda)" onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn" title="Siguiente (Flecha Derecha / Espacio)" onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script>
        const totalSlides = 13;
        let currentIdx = 0;
        const viewport = document.getElementById('presentation-viewport');

        function adjustScale() {
            const scale = Math.min(window.innerWidth / 1300, window.innerHeight / 750);
            viewport.style.transform = `scale(${scale})`;
        }

        async function createSlide(index) {
            try {
                const response = await fetch(`${index}.txt`);
                if (!response.ok) throw new Error(`No se pudo cargar ${index}.txt`);
                const htmlContent = await response.text();
                
                const wrapper = document.createElement('div');
                wrapper.className = `slide-frame ${index === 1 ? 'active' : ''}`;
                wrapper.id = `slide-${index}`;
                
                const shadow = wrapper.attachShadow({mode: 'open'});
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                // 1. Inyectar Estilos Críticos
                const baseStyles = `
                    :host { display: block; width: 100%; height: 100%; overflow: hidden; }
                    * { box-sizing: border-box; }
                `;
                const baseStyleTag = document.createElement('style');
                baseStyleTag.textContent = baseStyles;
                shadow.appendChild(baseStyleTag);

                // 2. Inyectar Tailwind y FontAwesome dentro del Shadow
                const tailwindLink = document.createElement('link');
                tailwindLink.rel = 'stylesheet';
                tailwindLink.href = 'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css';
                shadow.appendChild(tailwindLink);

                const faLink = document.createElement('link');
                faLink.rel = 'stylesheet';
                faLink.href = 'https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css';
                shadow.appendChild(faLink);

                // 3. Inyectar contenido HTML
                const contentDiv = document.createElement('div');
                contentDiv.innerHTML = doc.body.innerHTML;
                shadow.appendChild(contentDiv);

                // 4. Copiar estilos originales del archivo .txt
                const originalStyles = doc.querySelectorAll('style');
                originalStyles.forEach(st => shadow.appendChild(st.cloneNode(true)));

                viewport.appendChild(wrapper);

                // 5. Ejecutar Scripts con contexto de Shadow DOM
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(s => {
                    const newScript = document.createElement('script');
                    // IMPORTANTE: Definimos una variable local dentro del script para que 
                    // funciones como Chart.js puedan encontrar los elementos dentro del shadow
                    const wrappedCode = `
                        (function(shadow) {
                            const document = shadow; // Reemplazamos el documento global por el shadow
                            ${s.textContent}
                        })(this.parentNode);
                    `;
                    newScript.textContent = wrappedCode;
                    // Pequeño delay para asegurar que el DOM del shadow esté listo
                    setTimeout(() => shadow.appendChild(newScript), 100);
                });

            } catch (e) {
                console.error("Error en slide:", index, e);
            }
        }

        async function init() {
            adjustScale();
            window.addEventListener('resize', adjustScale);
            
            // Cargar diapositivas secuencialmente
            for(let i = 1; i <= totalSlides; i++) {
                await createSlide(i);
            }
            
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                updateView();
            }, 500);
        }

        function updateView() {
            const frames = document.querySelectorAll('.slide-frame');
            frames.forEach((f, i) => {
                f.classList.toggle('active', i === currentIdx);
                // Si la slide tiene una animación de entrada de Tailwind, reiniciarla
                if(i === currentIdx && f.shadowRoot) {
                    const container = f.shadowRoot.querySelector('.slide-container');
                    if(container) {
                        container.style.animation = 'none';
                        container.offsetHeight; // Trigger reflow
                        container.style.animation = null;
                    }
                }
            });
            document.getElementById('counter').innerText = `DIAPOSITIVA ${currentIdx + 1} / ${totalSlides}`;
        }

        function nextSlide() {
            if(currentIdx < totalSlides - 1) { 
                currentIdx++; 
                updateView(); 
            }
        }

        function prevSlide() {
            if(currentIdx > 0) { 
                currentIdx--; 
                updateView(); 
            }
        }

        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            if(e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        });

        init();
    </script>
</body>
</html>
