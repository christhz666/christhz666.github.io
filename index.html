<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Interactiva: Protección Radiológica</title>
    <!-- Recursos Globales para el Visor -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet"/>
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            background: #020617; 
            height: 100vh; width: 100vw; 
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        #presentation-viewport {
            width: 1280px; height: 720px;
            position: relative;
            transform-origin: center center;
            background: #0a1628;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .slide-frame {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide-frame.active {
            display: block;
        }

        /* Controles UI */
        .ui-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 9999;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .ui-overlay:hover { opacity: 1; }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background: #3b82f6; }

        #counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 1px;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border-top-color:transparent" class="w-12 h-12 border-4 border-blue-500 border-solid rounded-full animate-spin"></div>
        <p style="color: #60a5fa; margin-top: 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Cargando experiencia...</p>
    </div>

    <div id="presentation-viewport"></div>

    <div id="counter">DIAPOSITIVA 1 / 13</div>

    <div class="ui-overlay">
        <button class="nav-btn" onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn" onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script>
        const totalSlides = 13;
        let currentIdx = 0;
        const viewport = document.getElementById('presentation-viewport');

        function adjustScale() {
            const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720) * 0.95;
            viewport.style.transform = `scale(${scale})`;
        }

        async function createSlide(index) {
            try {
                const response = await fetch(`${index}.txt`);
                const html = await response.text();
                
                const wrapper = document.createElement('div');
                wrapper.className = `slide-frame ${index === 1 ? 'active' : ''}`;
                wrapper.id = `slide-${index}`;
                
                // Usamos Shadow DOM para aislar completamente los estilos de cada diapositiva
                const shadow = wrapper.attachShadow({mode: 'open'});
                
                // Parseamos el contenido para separar scripts de HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Inyectamos el contenido base al Shadow DOM
                shadow.innerHTML = doc.body.innerHTML;
                
                // Movemos los estilos del head al shadow
                const styles = doc.querySelectorAll('style, link[rel="stylesheet"]');
                styles.forEach(s => shadow.appendChild(s.cloneNode(true)));

                // Aseguramos que librerías críticas estén disponibles dentro del Shadow
                const tailwind = document.createElement('link');
                tailwind.rel = 'stylesheet';
                tailwind.href = 'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css';
                shadow.appendChild(tailwind);

                viewport.appendChild(wrapper);

                // Ejecutamos scripts después de un pequeño delay para asegurar carga de DOM
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(s => {
                    const newScript = document.createElement('script');
                    if(s.src) newScript.src = s.src;
                    else newScript.textContent = s.textContent;
                    // Los scripts de gráficos necesitan acceso al shadowRoot
                    shadow.appendChild(newScript);
                });

            } catch (e) {
                console.error("Error cargando slide", index, e);
            }
        }

        async function init() {
            adjustScale();
            window.addEventListener('resize', adjustScale);
            
            for(let i=1; i<=totalSlides; i++) {
                await createSlide(i);
            }
            
            document.getElementById('loading-screen').style.display = 'none';
        }

        function updateView() {
            document.querySelectorAll('.slide-frame').forEach((f, i) => {
                f.classList.toggle('active', i === currentIdx);
            });
            document.getElementById('counter').innerText = `DIAPOSITIVA ${currentIdx + 1} / ${totalSlides}`;
        }

        function nextSlide() {
            if(currentIdx < totalSlides - 1) { currentIdx++; updateView(); }
        }

        function prevSlide() {
            if(currentIdx > 0) { currentIdx--; updateView(); }
        }

        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if(e.key === 'ArrowLeft') prevSlide();
        });

        init();
    </script>
</body>
</html>
