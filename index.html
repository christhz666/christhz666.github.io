<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protección Radiológica - Visor Ultraestable</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #3b82f6;
            --text-main: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
        }

        #viewport-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            position: relative;
            background: #000;
        }

        /* Estilo para los iframes gestionados dinámicamente */
        .slide-frame {
            position: absolute;
            width: 1280px;
            height: 720px;
            border: none;
            background: #0a1628;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
            transform-origin: center;
        }

        .slide-frame.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .controls {
            height: 60px;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
        }

        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .page-info {
            color: #94a3b8;
            font-size: 0.9rem;
            min-width: 80px;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
        }

        #status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="viewport-container">
        <!-- Los iframes se inyectarán aquí dinámicamente -->
    </div>

    <div class="controls">
        <button class="btn" id="prev-btn" onclick="changeSlide(-1)">
            <i class="fas fa-chevron-left"></i> Anterior
        </button>
        <div class="page-info">
            <span id="status-dot"></span>
            <span id="page-display">01 / 13</span>
        </div>
        <button class="btn" id="next-btn" onclick="changeSlide(1)">
            Siguiente <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const container = document.getElementById('viewport-container');
        let activeFrame = null;

        // Escalar dinámicamente
        function updateScale() {
            if (!activeFrame) return;
            const scale = Math.min(
                (container.clientWidth - 40) / 1280,
                (container.clientHeight - 40) / 720
            );
            activeFrame.style.transform = `scale(${scale})`;
        }

        async function loadSlide(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error("Error de red");
                const htmlContent = await response.text();

                // 1. Crear nuevo iframe (Aislamiento total)
                const newFrame = document.createElement('iframe');
                newFrame.className = 'slide-frame';
                
                // 2. Inyectar contenido inmediatamente
                container.appendChild(newFrame);
                const doc = newFrame.contentWindow.document;
                doc.open();
                doc.write(htmlContent);
                doc.close();

                // 3. Esperar un momento a que el DOM interno procese scripts
                setTimeout(() => {
                    // Remover el frame anterior si existe
                    if (activeFrame) {
                        const oldFrame = activeFrame;
                        oldFrame.classList.remove('active');
                        // Eliminar del DOM tras la transición para liberar memoria
                        setTimeout(() => oldFrame.remove(), 400);
                    }

                    // Activar el nuevo
                    activeFrame = newFrame;
                    activeFrame.classList.add('active');
                    updateScale();
                    
                    // Forzar a Chart.js a despertar si está en la diapositiva
                    if (htmlContent.includes('Chart')) {
                        setTimeout(() => {
                            newFrame.contentWindow.dispatchEvent(new Event('resize'));
                        }, 100);
                    }
                }, 100);

                // UI updates
                document.getElementById('page-display').innerText = `${String(num).padStart(2, '0')} / ${totalSlides}`;
                document.getElementById('prev-btn').disabled = (num === 1);
                document.getElementById('next-btn').disabled = (num === totalSlides);
                
            } catch (err) {
                console.error("Error cargando slide:", err);
            }
        }

        function changeSlide(direction) {
            const next = currentSlide + direction;
            if (next >= 1 && next <= totalSlides) {
                currentSlide = next;
                loadSlide(currentSlide);
            }
        }

        window.addEventListener('resize', updateScale);
        window.onload = () => loadSlide(1);

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });
    </script>
</body>
</html>
