<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Diseño - Protección Radiológica</title>
    <style>
        :root {
            --bg-color: #020617;
            --accent: #3b82f6;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-color);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .slide-frame {
            position: absolute;
            width: 1280px;
            height: 720px;
            background: #0a1628;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center;
            transition: transform 0.2s ease-out;
            pointer-events: auto;
        }

        /* Indicador de carga y número de diapositiva */
        #info-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
        }

        /* Estilos inyectados para el modo diseño */
        .drag-handle {
            cursor: move !important;
            user-select: none;
        }
        
        .drag-handle:hover {
            outline: 2px solid var(--accent) !important;
            outline-offset: 2px;
        }

        .dragging {
            opacity: 0.8;
            z-index: 9999 !important;
        }
    </style>
</head>
<body>

    <div id="info-overlay">Diapositiva 1 / 13 | Usa Flechas para Navegar</div>
    
    <div id="canvas">
        <!-- El contenido se carga aquí -->
    </div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const canvas = document.getElementById('canvas');
        const info = document.getElementById('info-overlay');

        function updateScale(frame) {
            if (!frame) return;
            const padding = 40;
            const scale = Math.min(
                (window.innerWidth - padding) / 1280,
                (window.innerHeight - padding) / 720
            );
            frame.style.transform = `scale(${scale})`;
        }

        async function loadSlide(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error("Error cargando slide");
                let content = await response.text();

                // Limpieza de fuentes y ajustes específicos para la Slide 7
                content = content.replace(/family=Montserrat:wght@.*?&amp;family=Roboto/g, 'family=Montserrat:wght@300;400;600;700&family=Roboto');
                
                // Parche específico para la diapositiva 7 para que no se corte
                if (num === 7) {
                    content = content.replace('height: 100vh', 'height: 720px');
                    content = content.replace('overflow: hidden', 'overflow: visible');
                }

                canvas.innerHTML = '';
                const frame = document.createElement('iframe');
                frame.className = 'slide-frame';
                frame.srcdoc = content;
                canvas.appendChild(frame);

                frame.onload = () => {
                    updateScale(frame);
                    setupDraggableElements(frame);
                };

                currentSlide = num;
                info.innerText = `Diapositiva ${num} de ${totalSlides} | Modo Diseño Activo`;
            } catch (err) {
                console.error(err);
            }
        }

        function setupDraggableElements(frame) {
            const doc = frame.contentDocument || frame.contentWindow.document;
            
            // Inyectar CSS de diseño dentro del iframe
            const style = doc.createElement('style');
            style.innerHTML = `
                body { overflow: visible !important; height: 720px !important; width: 1280px !important; }
                .movable { cursor: move !important; transition: none !important; }
                .movable:hover { outline: 2px solid #3b82f6 !important; }
                /* Asegurar que la slide 7 no corte el contenido */
                .content-wrapper, section, div { max-height: none !important; }
            `;
            doc.head.appendChild(style);

            // Identificar elementos movibles (divs de contenido, imágenes, secciones)
            const elements = doc.querySelectorAll('div, section, img, h1, h2, p, ul');
            
            elements.forEach(el => {
                if (el.children.length < 10 || el.tagName === 'IMG') { // Evitar mover el body o contenedores gigantes
                    el.classList.add('movable');
                    makeElementDraggable(el, doc);
                }
            });
        }

        function makeElementDraggable(el, doc) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                e.stopPropagation();
                pos3 = e.clientX;
                pos4 = e.clientY;
                doc.onmouseup = closeDragElement;
                doc.onmousemove = elementDrag;
                el.classList.add('dragging');
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;

                // Calculamos nueva posición
                const newTop = el.offsetTop - pos2;
                const newLeft = el.offsetLeft - pos1;

                el.style.top = newTop + "px";
                el.style.left = newLeft + "px";
                el.style.position = "absolute"; // Forzamos absoluta para movimiento libre
                el.style.margin = "0";
            }

            function closeDragElement() {
                doc.onmouseup = null;
                doc.onmousemove = null;
                el.classList.remove('dragging');
            }
        }

        function changeSlide(dir) {
            const next = currentSlide + dir;
            if (next >= 1 && next <= totalSlides) loadSlide(next);
        }

        // Navegación con teclado activa desde el inicio
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === " ") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });

        window.addEventListener('resize', () => {
            updateScale(canvas.querySelector('iframe'));
        });

        // Carga inicial
        window.onload = () => loadSlide(1);
    </script>
</body>
</html>
