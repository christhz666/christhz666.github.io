<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protección Radiológica - Sistema de Presentación</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #3b82f6;
            --text-main: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column;
        }

        #viewport-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        #slide-frame {
            width: 1280px;
            height: 720px;
            border: none;
            background: #0a1628;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 4px;
            transform-origin: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .controls {
            height: 70px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 700;
            min-width: 100px;
            text-align: center;
            font-family: monospace;
        }

        #loader-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loader-content { text-align: center; color: white; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <div style="font-size: 12px; opacity: 0.7; letter-spacing: 2px;">CARGANDO...</div>
        </div>
    </div>

    <div id="viewport-container">
        <iframe id="slide-frame" name="slide-frame"></iframe>
    </div>

    <div class="controls">
        <button class="btn" id="prev-btn" onclick="changeSlide(-1)">
            <i class="fas fa-arrow-left"></i> Anterior
        </button>
        <div class="page-info" id="page-display">01 / 13</div>
        <button class="btn" id="next-btn" onclick="changeSlide(1)">
            Siguiente <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const frame = document.getElementById('slide-frame');
        const loader = document.getElementById('loader-overlay');
        
        // Función para escalar el contenido
        function updateScale() {
            const container = document.getElementById('viewport-container');
            const scale = Math.min(
                (container.clientWidth - 20) / 1280,
                (container.clientHeight - 20) / 720
            );
            frame.style.transform = `scale(${scale})`;
        }

        // Carga de archivos con gestión de scripts
        async function loadSlideContent(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error('No se pudo encontrar el archivo');
                let html = await response.text();

                // Resetear iframe para limpiar memoria y scripts previos
                frame.style.opacity = '0';
                
                // Pequeña pausa para asegurar limpieza de DOM
                await new Promise(r => setTimeout(r, 50));

                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(html);
                doc.close();

                // Verificar si hay gráficos y forzar un redibujado si es necesario
                // Esto ayuda a las slides 9 y 11
                if (html.includes('Chart')) {
                    setTimeout(() => {
                        if (frame.contentWindow.window.dispatchEvent) {
                            frame.contentWindow.window.dispatchEvent(new Event('resize'));
                        }
                    }, 500);
                }

                // Actualizar UI
                document.getElementById('page-display').innerText = `${String(num).padStart(2, '0')} / ${totalSlides}`;
                document.getElementById('prev-btn').disabled = (num === 1);
                document.getElementById('next-btn').disabled = (num === totalSlides);
                
                frame.style.opacity = '1';
            } catch (err) {
                console.error("Error cargando slide:", err);
            }
        }

        function changeSlide(direction) {
            const next = currentSlide + direction;
            if (next >= 1 && next <= totalSlides) {
                currentSlide = next;
                loadSlideContent(currentSlide);
            }
        }

        window.addEventListener('resize', updateScale);
        
        window.onload = async () => {
            updateScale();
            await loadSlideContent(1);
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        };

        // Soporte para teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });
    </script>
</body>
</html>
