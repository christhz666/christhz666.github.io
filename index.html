<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protección Radiológica - Presentación Interactiva</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #3b82f6;
            --text-main: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
        }

        /* Contenedor Principal */
        #viewport-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* El Iframe que contendrá la slide */
        #slide-frame {
            width: 1280px;
            height: 720px;
            border: none;
            background: #0a1628;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            transition: opacity 0.3s ease;
        }

        /* Navegación Inferior */
        .controls {
            height: 80px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 10px;
            font-weight: 600;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            min-width: 120px;
            text-align: center;
        }

        /* Pantalla de Carga */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1300px) {
            #slide-frame {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 20px;">Iniciando Presentación...</p>
    </div>

    <div id="viewport-container">
        <iframe id="slide-frame" title="Slide Content"></iframe>
    </div>

    <div class="controls">
        <button class="btn" id="prev-btn" onclick="changeSlide(-1)">
            <i class="fas fa-chevron-left"></i> Anterior
        </button>
        <div class="page-info" id="page-display">1 / 13</div>
        <button class="btn" id="next-btn" onclick="changeSlide(1)">
            Siguiente <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const frame = document.getElementById('slide-frame');
        const loader = document.getElementById('loader');

        function updateScale() {
            const container = document.getElementById('viewport-container');
            const scale = Math.min(
                (container.clientWidth - 40) / 1280,
                (container.clientHeight - 40) / 720
            );
            frame.style.transform = `scale(${scale})`;
        }

        async function loadSlide(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error('Error al cargar archivo');
                let content = await response.text();
                
                // Inyectamos el contenido directamente en el documento del iframe
                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(content);
                doc.close();

                // Actualizar UI
                document.getElementById('page-display').innerText = `${num} / ${totalSlides}`;
                document.getElementById('prev-btn').disabled = (num === 1);
                document.getElementById('next-btn').disabled = (num === totalSlides);
            } catch (err) {
                console.error(err);
                frame.contentWindow.document.body.innerHTML = `
                    <div style="color: white; text-align: center; padding-top: 100px;">
                        <h2>Error al cargar la diapositiva ${num}</h2>
                        <p>Asegúrate de que el archivo ${num}.txt existe.</p>
                    </div>`;
            }
        }

        function changeSlide(direction) {
            const next = currentSlide + direction;
            if (next >= 1 && next <= totalSlides) {
                currentSlide = next;
                frame.style.opacity = '0';
                setTimeout(() => {
                    loadSlide(currentSlide);
                    frame.style.opacity = '1';
                }, 200);
            }
        }

        // Iniciar
        window.addEventListener('resize', updateScale);
        
        window.onload = () => {
            updateScale();
            loadSlide(1).then(() => {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 1000);
            });
        };

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === " ") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });
    </script>
</body>
</html>
