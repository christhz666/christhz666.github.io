<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Maestro - Protección Radiológica</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --accent: #3b82f6;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-color);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .slide-frame {
            position: absolute;
            width: 1280px;
            height: 720px;
            background: #0a1628;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center;
            pointer-events: auto;
            user-select: none;
        }

        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 13px;
            color: #94a3b8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .key-hint {
            background: rgba(59, 130, 246, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            color: #60a5fa;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .save-indicator {
            color: #10b981;
            font-weight: bold;
            display: none;
        }

        #export-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #60a5fa;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        #export-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.4);
            color: #fff;
        }
        #export-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #export-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            color: white;
            font-size: 16px;
        }
        #export-overlay.active { display: flex; }
        #export-progress-bar-wrap {
            width: 320px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        #export-progress-bar {
            height: 100%;
            background: #3b82f6;
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>Diapositiva <b id="current-num" style="color: white;">1</b> / 13</span>
        <span>|</span>
        <span>Arrastra elementos libremente</span>
        <span>|</span>
        <span>Navegar: <span class="key-hint">←</span> <span class="key-hint">→</span></span>
        <span id="save-msg" class="save-indicator">✓ Guardado</span>
        <span>|</span>
        <button id="export-btn" onclick="exportToPowerPoint()">📊 Exportar a PowerPoint</button>
    </div>
    
    <div id="export-overlay">
        <div id="export-status">Preparando exportación...</div>
        <div id="export-progress-bar-wrap"><div id="export-progress-bar"></div></div>
    </div>

    <div id="canvas"></div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const canvas = document.getElementById('canvas');
        const currentNumDisp = document.getElementById('current-num');
        const saveMsg = document.getElementById('save-msg');

        // Función para guardar posiciones en LocalStorage
        function savePosition(slideId, elementId, top, left) {
            const storageKey = `slide_data_${slideId}`;
            let slideData = JSON.parse(localStorage.getItem(storageKey) || '{}');
            slideData[elementId] = { top, left };
            localStorage.setItem(storageKey, JSON.stringify(slideData));
            
            // Mostrar indicador de guardado
            saveMsg.style.display = 'inline';
            setTimeout(() => { saveMsg.style.display = 'none'; }, 1000);
        }

        // Función para aplicar posiciones guardadas
        function applySavedPositions(doc, slideId) {
            const storageKey = `slide_data_${slideId}`;
            const slideData = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            Object.keys(slideData).forEach(id => {
                const el = doc.querySelector(`[data-edit-id="${id}"]`);
                if (el) {
                    el.style.position = 'absolute';
                    el.style.top = slideData[id].top;
                    el.style.left = slideData[id].left;
                    el.style.margin = '0';
                }
            });
        }

        function updateScale(frame) {
            if (!frame) return;
            const scale = Math.min(
                (window.innerWidth - 80) / 1280,
                (window.innerHeight - 80) / 720
            );
            frame.style.transform = `scale(${scale})`;
        }

        async function loadSlide(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error("No slide file");
                let content = await response.text();

                canvas.innerHTML = '';
                const frame = document.createElement('iframe');
                frame.className = 'slide-frame';
                frame.srcdoc = content;
                canvas.appendChild(frame);

                frame.onload = () => {
                    updateScale(frame);
                    injectDesignEngine(frame, num);
                };

                currentSlide = num;
                currentNumDisp.innerText = num;
            } catch (err) {
                console.error(err);
            }
        }

        function injectDesignEngine(frame, slideNum) {
            const doc = frame.contentDocument || frame.contentWindow.document;
            
            const style = doc.createElement('style');
            style.innerHTML = `
                body { 
                    overflow: hidden !important; 
                    width: 1280px !important; 
                    height: 720px !important;
                    user-select: none;
                }
                * { cursor: grab !important; }
                *:active { cursor: grabbing !important; }
                
                /* FIX Diapositiva 7: Mantener estructura pero permitir desborde */
                ${slideNum === 7 ? `
                    .grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 2rem; align-items: center; }
                    .model-container { max-height: none !important; height: auto !important; display: block !important; }
                    section, main { overflow: visible !important; height: auto !important; }
                ` : ''}
            `;
            doc.head.appendChild(style);

            // Asignar IDs únicos temporales si no tienen para poder guardarlos
            const allElements = doc.querySelectorAll('body *:not(script):not(style):not(br)');
            allElements.forEach((el, index) => {
                // Generamos un ID basado en su jerarquía o contenido si no tiene uno
                const identifier = el.id || `el-${index}-${el.tagName}`;
                el.setAttribute('data-edit-id', identifier);
                
                // Hacer draggable
                makeDraggable(el, doc, slideNum);
            });

            // Aplicar lo que el usuario movió anteriormente
            applySavedPositions(doc, slideNum);
        }

        function makeDraggable(el, doc, slideId) {
            let startX, startY, initialLeft, initialTop;

            el.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return; // Solo click izquierdo
                e.preventDefault();
                e.stopPropagation();

                const rect = el.getBoundingClientRect();
                
                if (window.getComputedStyle(el).position !== 'absolute') {
                    const top = el.offsetTop;
                    const left = el.offsetLeft;
                    el.style.width = rect.width + 'px'; // Mantener ancho
                    el.style.position = 'absolute';
                    el.style.top = top + 'px';
                    el.style.left = left + 'px';
                    el.style.margin = '0';
                    el.style.zIndex = '1000';
                }

                startX = e.clientX;
                startY = e.clientY;
                initialLeft = parseFloat(el.style.left) || 0;
                initialTop = parseFloat(el.style.top) || 0;

                function onMouseMove(moveEvent) {
                    const dx = moveEvent.clientX - startX;
                    const dy = moveEvent.clientY - startY;
                    const newLeft = (initialLeft + dx) + 'px';
                    const newTop = (initialTop + dy) + 'px';
                    
                    el.style.left = newLeft;
                    el.style.top = newTop;
                }

                function onMouseUp() {
                    // Guardar al soltar
                    savePosition(slideId, el.getAttribute('data-edit-id'), el.style.top, el.style.left);
                    
                    doc.removeEventListener('mousemove', onMouseMove);
                    doc.removeEventListener('mouseup', onMouseUp);
                }

                doc.addEventListener('mousemove', onMouseMove);
                doc.addEventListener('mouseup', onMouseUp);
            });
        }

        // Navegación
        function changeSlide(dir) {
            const next = currentSlide + dir;
            if (next >= 1 && next <= totalSlides) loadSlide(next);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });

        window.addEventListener('resize', () => {
            updateScale(canvas.querySelector('iframe'));
        });

        loadSlide(1);

        async function exportToPowerPoint() {
            const btn = document.getElementById('export-btn');
            const overlay = document.getElementById('export-overlay');
            const statusEl = document.getElementById('export-status');
            const progressBar = document.getElementById('export-progress-bar');

            btn.disabled = true;
            overlay.classList.add('active');

            const pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_WIDE'; // 13.33" x 7.5" (16:9)

            // Hidden capture iframe (off-screen)
            const captureFrame = document.createElement('iframe');
            captureFrame.style.cssText = 'position:fixed;left:-9999px;top:0;width:1280px;height:720px;border:none;visibility:hidden;';
            document.body.appendChild(captureFrame);

            try {
                for (let i = 1; i <= totalSlides; i++) {
                    statusEl.textContent = `Procesando diapositiva ${i} de ${totalSlides}…`;
                    progressBar.style.width = `${Math.round(((i - 1) / totalSlides) * 100)}%`;

                    const response = await fetch(`${i}.txt`);
                    if (!response.ok) throw new Error(`No se pudo cargar la diapositiva ${i}`);
                    const html = await response.text();

                    await new Promise((resolve, reject) => {
                        captureFrame.onload = async () => {
                            try {
                                const doc = captureFrame.contentDocument || captureFrame.contentWindow.document;

                                // Wait for fonts to be ready, then allow a short grace period for icons
                                await doc.fonts.ready;
                                await new Promise(r => setTimeout(r, 1000)); // Increased wait time for charts

                                const slide = pptx.addSlide();
                                
                                // Set background color
                                slide.background = { color: '0a1628' };

                                // Extract and add content as editable elements
                                await extractAndAddContent(doc, slide, i);

                                resolve();
                            } catch (err) { reject(err); }
                        };
                        captureFrame.srcdoc = html;
                    });
                }

                progressBar.style.width = '100%';
                statusEl.textContent = 'Generando archivo PowerPoint…';
                await pptx.writeFile({ fileName: 'Proteccion_Radiologica.pptx' });
            } catch (err) {
                console.error('Error al exportar:', err);
                statusEl.textContent = `Error: ${err.message}`;
                await new Promise(r => setTimeout(r, 2500));
            } finally {
                document.body.removeChild(captureFrame);
                overlay.classList.remove('active');
                btn.disabled = false;
            }
        }

        async function extractAndAddContent(doc, slide, slideNum) {
            // Get the window object from the iframe
            const win = doc.defaultView || doc.parentWindow;
            
            // Extract main title
            const titleEl = doc.querySelector('.title, h1');
            if (titleEl) {
                const titleText = titleEl.textContent.trim();
                slide.addText(titleText, {
                    x: 0.8, y: 0.4, w: 11, h: 0.8,
                    fontSize: 32,
                    bold: true,
                    color: 'FFFFFF',
                    fontFace: 'Montserrat',
                    align: 'left',
                    valign: 'middle'
                });

                // Add title marker/accent line
                slide.addShape(pptx.ShapeType.rect, {
                    x: 0.4, y: 0.4, w: 0.08, h: 0.8,
                    fill: { color: '00d4ff' }
                });
            }

            // Extract and add text content - improved selector
            const contentContainers = doc.querySelectorAll('.bullet-point, .concept-card, .group-box, .list-item');
            let yPosition = 1.5;
            const maxY = 6.5;
            const leftColumnWidth = 5.5;
            
            contentContainers.forEach((container) => {
                if (yPosition > maxY) return;
                
                // Skip footer elements
                if (container.closest('.footer')) return;
                
                // Extract title if present
                const titleEl = container.querySelector('.concept-title, .group-title, .list-number');
                const textEl = container.querySelector('.concept-text, .group-desc, .bullet-text, .list-text');
                
                if (titleEl) {
                    const titleText = titleEl.textContent.trim();
                    if (titleText) {
                        slide.addText(titleText, {
                            x: 0.8, 
                            y: yPosition, 
                            w: leftColumnWidth, 
                            h: 0.35,
                            fontSize: 14,
                            bold: true,
                            color: '00d4ff',
                            fontFace: 'Montserrat',
                            align: 'left',
                            valign: 'top'
                        });
                        yPosition += 0.4;
                    }
                }
                
                if (textEl) {
                    const text = textEl.textContent.trim();
                    if (text && text.length >= 3) {
                        // Remove HTML tags and clean up
                        const cleanText = text.replace(/<[^>]*>/g, '');
                        
                        slide.addText(cleanText, {
                            x: 0.8, 
                            y: yPosition, 
                            w: leftColumnWidth, 
                            h: 'auto',
                            fontSize: 11,
                            color: 'e0e6ed',
                            fontFace: 'Roboto',
                            align: 'left',
                            valign: 'top'
                        });
                        
                        // Estimate height based on text length
                        const estimatedHeight = Math.max(0.25, (cleanText.length / 80) * 0.25);
                        yPosition += estimatedHeight + 0.15;
                    }
                }
            });

            // For slides with charts or complex visuals, capture them as images
            const hasChart = doc.querySelector('canvas');
            const hasComplexVisual = doc.querySelector('.penetration-diagram, .chart-container, .range-visual-container, .visual-column, .right-column');
            
            if (hasChart || hasComplexVisual) {
                // Wait for charts to render
                if (hasChart) {
                    await new Promise(r => setTimeout(r, 500));
                }
                
                // Capture the visual area as an image
                const visualArea = doc.querySelector('.visual-column, .right-column') || 
                                  doc.querySelector('.chart-container') ||
                                  doc.querySelector('.penetration-diagram');
                
                if (visualArea) {
                    const canvas = await html2canvas(visualArea, {
                        width: visualArea.scrollWidth,
                        height: visualArea.scrollHeight,
                        useCORS: true,
                        scale: 1.5,
                        backgroundColor: null
                    });

                    const imgData = canvas.toDataURL('image/png', 0.95);
                    slide.addImage({ 
                        data: imgData, 
                        x: 6.8, 
                        y: 1.5, 
                        w: 6, 
                        h: 4.5,
                        sizing: { type: 'contain', w: 6, h: 4.5 }
                    });
                }
            }

            // Add footer text
            slide.addText('Protección Radiológica - Capítulo I', {
                x: 0.5, y: 6.8, w: 5, h: 0.3,
                fontSize: 9,
                color: '666666',
                fontFace: 'Roboto Mono',
                align: 'left'
            });
            
            slide.addText(`Página ${slideNum.toString().padStart(2, '0')}`, {
                x: 11.5, y: 6.8, w: 1.5, h: 0.3,
                fontSize: 9,
                color: '666666',
                fontFace: 'Roboto Mono',
                align: 'right'
            });
        }
    </script>
</body>
</html>
