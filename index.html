<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protección Radiológica - Visor Estable</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #3b82f6;
            --text-main: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
        }

        #viewport-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        /* Iframe con aislamiento total */
        .slide-frame {
            position: absolute;
            width: 1280px;
            height: 720px;
            border: none;
            background: #0a1628;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform-origin: center;
            display: block;
        }

        .controls {
            height: 60px;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn:hover:not(:disabled) { background: var(--accent); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .page-info {
            color: #94a3b8;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
        }
    </style>
</head>
<body>

    <div id="viewport-container">
        <!-- El iframe se recreará aquí -->
    </div>

    <div class="controls">
        <button class="btn" id="prev-btn" onclick="changeSlide(-1)">
            <i class="fas fa-chevron-left"></i> Anterior
        </button>
        <div class="page-info" id="page-display">01 / 13</div>
        <button class="btn" id="next-btn" onclick="changeSlide(1)">
            Siguiente <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const container = document.getElementById('viewport-container');

        function updateScale(frame) {
            if (!frame) return;
            const scale = Math.min(
                (container.clientWidth - 40) / 1280,
                (container.clientHeight - 40) / 720
            );
            frame.style.transform = `scale(${scale})`;
        }

        async function loadSlide(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error("No se pudo cargar la diapositiva");
                const htmlContent = await response.text();

                // LIMPIEZA ABSOLUTA: 
                // Eliminamos cualquier iframe existente para matar procesos de JS previos
                container.innerHTML = '';

                // CREACIÓN DESDE CERO:
                const newFrame = document.createElement('iframe');
                newFrame.className = 'slide-frame';
                
                // Usamos srcdoc para asegurar un "Clean Slate" (pizarra limpia)
                // Esto previene el error "Identifier already declared"
                newFrame.srcdoc = htmlContent;

                container.appendChild(newFrame);

                // Re-escalar cuando el iframe cargue
                newFrame.onload = () => updateScale(newFrame);
                
                // Actualizar UI
                document.getElementById('page-display').innerText = `${String(num).padStart(2, '0')} / ${totalSlides}`;
                document.getElementById('prev-btn').disabled = (num === 1);
                document.getElementById('next-btn').disabled = (num === totalSlides);
                
                currentSlide = num;

            } catch (err) {
                console.error("Error:", err);
            }
        }

        function changeSlide(direction) {
            const next = currentSlide + direction;
            if (next >= 1 && next <= totalSlides) {
                loadSlide(next);
            }
        }

        // Observar cambios de tamaño de ventana
        window.addEventListener('resize', () => {
            const frame = container.querySelector('iframe');
            if (frame) updateScale(frame);
        });

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });

        // Inicio
        window.onload = () => loadSlide(1);
    </script>
</body>
</html>
