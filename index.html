<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Objetos - Protección Radiológica</title>
    <style>
        :root {
            --bg-color: #020617;
            --accent: #3b82f6;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-color);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #020617;
        }

        .slide-frame {
            position: absolute;
            width: 1280px;
            height: 720px;
            background: #0a1628;
            border: none;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            transform-origin: center;
            transition: transform 0.1s ease-out;
            pointer-events: auto;
        }

        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 13px;
            color: #94a3b8;
            pointer-events: none;
        }

        .key-hint {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>Diapositiva <b id="current-num">1</b> / 13</span>
        <span>|</span>
        <span>Mover objetos: <span class="key-hint">Arrastrar con Mouse</span></span>
        <span>|</span>
        <span>Navegar: <span class="key-hint">←</span> <span class="key-hint">→</span></span>
    </div>
    
    <div id="canvas"></div>

    <script>
        const totalSlides = 13;
        let currentSlide = 1;
        const canvas = document.getElementById('canvas');
        const currentNumDisp = document.getElementById('current-num');

        function updateScale(frame) {
            if (!frame) return;
            const scale = Math.min(
                (window.innerWidth - 60) / 1280,
                (window.innerHeight - 60) / 720
            );
            frame.style.transform = `scale(${scale})`;
        }

        async function loadSlide(num) {
            try {
                const response = await fetch(`${num}.txt`);
                if (!response.ok) throw new Error("Slide no encontrada");
                let content = await response.text();

                canvas.innerHTML = '';
                const frame = document.createElement('iframe');
                frame.className = 'slide-frame';
                frame.srcdoc = content;
                canvas.appendChild(frame);

                frame.onload = () => {
                    updateScale(frame);
                    injectDesignEngine(frame, num);
                };

                currentSlide = num;
                currentNumDisp.innerText = num;
            } catch (err) {
                console.error("Error:", err);
            }
        }

        function injectDesignEngine(frame, slideNum) {
            const doc = frame.contentDocument || frame.contentWindow.document;
            
            // Inyectar estilos globales de edición
            const style = doc.createElement('style');
            style.innerHTML = `
                * { cursor: move !important; }
                body { 
                    overflow: visible !important; 
                    height: 720px !important; 
                    width: 1280px !important; 
                    background: transparent !important;
                }
                .is-dragging { 
                    opacity: 0.7 !important; 
                    z-index: 99999 !important; 
                    pointer-events: none !important;
                }
                /* ARREGLO DIAPOSITIVA 7 */
                ${slideNum === 7 ? `
                    .content-wrapper, section, .grid, main { 
                        display: block !important; 
                        height: auto !important; 
                        max-height: none !important; 
                        overflow: visible !important; 
                    }
                    img, .model-container { 
                        max-height: none !important; 
                        height: auto !important; 
                    }
                ` : ''}
            `;
            doc.head.appendChild(style);

            // Seleccionar absolutamente todo lo que sea visible
            const allElements = doc.querySelectorAll('body *');
            
            allElements.forEach(el => {
                // Solo aplicar a elementos con contenido o imágenes
                if (el.tagName !== 'SCRIPT' && el.tagName !== 'STYLE' && el.tagName !== 'BR') {
                    makeDraggable(el, doc);
                }
            });
        }

        function makeDraggable(el, doc) {
            let startX, startY, initialLeft, initialTop;

            el.addEventListener('mousedown', function(e) {
                // Evitar seleccionar texto mientras arrastramos
                e.preventDefault();
                e.stopPropagation();

                const rect = el.getBoundingClientRect();
                
                // Forzamos posicionamiento absoluto para que sea libre
                if (window.getComputedStyle(el).position !== 'absolute') {
                    const top = el.offsetTop;
                    const left = el.offsetLeft;
                    el.style.position = 'absolute';
                    el.style.top = top + 'px';
                    el.style.left = left + 'px';
                    el.style.margin = '0';
                    // Mantener el tamaño original
                    el.style.width = rect.width + 'px';
                }

                startX = e.clientX;
                startY = e.clientY;
                initialLeft = parseFloat(el.style.left) || 0;
                initialTop = parseFloat(el.style.top) || 0;

                el.classList.add('is-dragging');

                function onMouseMove(moveEvent) {
                    const dx = moveEvent.clientX - startX;
                    const dy = moveEvent.clientY - startY;
                    el.style.left = (initialLeft + dx) + 'px';
                    el.style.top = (initialTop + dy) + 'px';
                }

                function onMouseUp() {
                    el.classList.remove('is-dragging');
                    doc.removeEventListener('mousemove', onMouseMove);
                    doc.removeEventListener('mouseup', onMouseUp);
                }

                doc.addEventListener('mousemove', onMouseMove);
                doc.addEventListener('mouseup', onMouseUp);
            }, true);
        }

        // Navegación
        function changeSlide(dir) {
            const next = currentSlide + dir;
            if (next >= 1 && next <= totalSlides) loadSlide(next);
        }

        // Flechas funcionando desde el inicio
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });

        window.addEventListener('resize', () => {
            updateScale(canvas.querySelector('iframe'));
        });

        // Inicio automático
        loadSlide(1);
    </script>
</body>
</html>
